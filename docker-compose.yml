services:
  nginx:
    image: nginx:1.25-alpine
    depends_on: [php]
    expose:
      - "80"
    volumes:
      - ./:/var/www/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    command: ["/bin/sh","-c","rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    restart: always

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    environment:
      - TZ=America/Sao_Paulo
      - APP_ENV=prod

      # MySQL (já está ok)
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      # Postgres (vai vir do Dokploy Environment)
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT:-5432}
      - PG_DB=${PG_DB}
      - PG_USER=${PG_USER}
      - PG_PASS=${PG_PASS}

      # Pagar.me (também do Dokploy env, melhor)
      - PAGARME_API_KEY=${PAGARME_API_KEY}
      - PAGARME_BASE_URL=${PAGARME_BASE_URL:-https://api.pagar.me/core/v5}

      - CRON_PAGARME_SECRET=${CRON_PAGARME_SECRET:-troque-este-token}
      - CRON_DEBUG=${CRON_DEBUG:-1}
      - CRON_LOG_FILE=${CRON_LOG_FILE:-/tmp/cron_sync.log}

    volumes:
      - ./:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro

    env_file:
      - .env
    restart: always
