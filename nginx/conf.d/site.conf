server {
    listen 80 default_server;
    server_name _;

    # Seu site está dentro de /public
    root /var/www/html/public;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # healthcheck
    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # bloquear arquivos sensíveis
    location ~* (^|/)(config\.php|\.env|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.git|\.hg|\.svn|\.DS_Store|.*\.(ini|log|sql|yml|yaml|lock|bak|old|backup))$ {
        deny all;
        return 404;
    }

    # estáticos
    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|ico|webp|avif|woff2?)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # =========================
    # BLOG: URL bonita
    # =========================

    # URL feia -> bonita (apenas quando o CLIENTE acessar essa URL)
    if ($request_uri ~* ^/blog/posts/index\.php\?slug=([a-z0-9-]+)$) {
        return 301 /blog/$1;
    }

    # URL bonita /blog/slug -> handler atual /blog/posts/index.php?slug=slug
    location ~ ^/blog/([a-z0-9-]+)/?$ {
        rewrite ^/blog/([a-z0-9-]+)/?$ /blog/posts/index.php?slug=$1 last;
    }

    # rota padrão do site
    location / {
        try_files $uri $uri/ /index.php?$query_string /index.html;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # IMPORTANTÍSSIMO: o nome do serviço aqui precisa bater com o docker-compose
        fastcgi_pass php:9000;

        fastcgi_read_timeout 120s;
    }
}
